<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ESP32-CAM Live Stream</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #6e8efb, #a777e2);
      color: white;
      text-align: center;
      padding: 20px;
      margin: 0;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .video-container {
      margin: 30px auto;
      padding: 20px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: 15px;
      max-width: 800px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }
    .video-frame {
      width: 100%;
      height: 480px;
      border: 4px solid #fff;
      border-radius: 10px;
      background: #000;
      display: block;
    }
    .controls {
      margin: 15px 0;
    }
    .ip-display {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 1.1em;
    }
    .btn {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1em;
      margin: 5px;
    }
    .btn:hover { background: #45a049; }
    .emoji { font-size: 3em; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
  </style>
</head>
<body>

  <div class="emoji">Live Camera</div>
  <h1>ESP32-CAM @ 192.168.0.132</h1>
  <p>Live MJPEG stream from your ESP32-CAM</p>

  <div class="video-container">
    <img id="stream" class="video-frame" src="" alt="Loading stream...">
    <div class="controls">
      <div class="ip-display">IP: <span id="currentIp">192.168.0.132</span></div>
      <button class="btn" onclick="reloadStream()">Refresh Stream</button>
    </div>
  </div>

  <p><strong>GitHub Pages URL:</strong> <a id="pageUrl" href="#" style="color:#fff;">Loading...</a></p>

  <script>
    const ESP_IP = "192.168.0.132";
    const streamUrl = `http://${ESP_IP}/stream`;

    const video = document.getElementById('stream');
    const ipSpan = document.getElementById('currentIp');
    const pageUrl = document.getElementById('pageUrl');

    // Set page URL
    pageUrl.textContent = window.location.href;
    pageUrl.href = window.location.href;

    // Load stream
    function loadStream() {
      video.src = streamUrl + '?t=' + new Date().getTime(); // Cache buster
      ipSpan.textContent = ESP_IP;
    }

    // Reload stream
    function reloadStream() {
      video.src = ''; // Clear
      setTimeout(loadStream, 500);
    }

    // Auto-load on start
    window.onload = loadStream;

    // Auto-reload every 30 seconds to prevent freeze
    setInterval(reloadStream, 30000);
  </script>

</body>
</html>
